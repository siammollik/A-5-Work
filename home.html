<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home Page</title>
    <!-- google font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

    <!--  daisy and css-->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- font awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>

<body class="bg-slate-100">
    <section class="p-5 flex justify-between bg-white shadow-md ">
        <div class="md:flex gap-2 items-center md:ml-15">
            <img class="w-10 h-10" src="./assets/github-logo.png" alt="">
            <h3 class="md:text-2xl font-bold">GitHub Issues Tracker</h3>
        </div>

        <div class="md:mr-15">
            <div class="join">
                <div>
                    <label class="input validator join-item">
                        <input id="input-search" type="text" placeholder=" Search issues..." required  />
                    </label>
                </div>
                <button id="search-btn" class="btn btn-primary join-item"><span><i class="fa-solid fa-plus"></i></span> New
                    Issue</button>
            </div>
        </div>
    </section>


    <section class="mt-15 w-9/12 mx-auto">
        <section class=" bg-white rounded-md ">
            <div class="p-4 flex gap-3 ">
                <button id="allBtn" class="btn btn-primary issueBtn">All</button>
                <button id="openBtn" class="btn btn-primary issueBtn">Open</button>
                <button id="closeBtn" class="btn btn-primary issueBtn">Closed</button>
            </div>
        </section>

        <section class="mt-5">
            <div class=" bg-white flex justify-between">
                <div class="flex gap-2  p-4">
                    <img src="./assets/Aperture.png" alt="">
                    <div>
                        <p id="issues-count" class="font-bold text-xl"></p>
                        <p class="whitespace-nowrap">Track and manage your project issues</p>
                    </div>

                </div>
                <div class="flex items-center md:pr-5 gap-3  whitespace-nowrap">
                    <div class="w-3 h-3 bg-[#00A96E] rounded-full"></div>
                    <p>Open</p>

                    <div class="w-3 h-3 bg-[#A855F7] rounded-full"></div>
                    <p>Closed</p>
                </div>
            </div>
        </section>


        <section class="bg-white border-t-1 ">

            <div id="card-container" class="card-container grid grid-cols-1 md:grid-cols-4 gap-3  pt-10 p-4 ">
            </div>

        </section>
        <section id="spinner" class="py-10 flex justify-center items-center hidden">
        <span class="loading loading-bars loading-xl"></span>
    </section>
    </section>

    <!-- Open the modal using ID.showModal() method -->
    <!-- <button class="btn" onclick="my_modal_5.showModal()">open modal</button> -->
    <dialog id="my_modal" class="modal modal-middle">
        <div class="modal-box">
            <div id="modal-container" class="">


            </div>
        </div>
    </dialog>

    <script src="./home.js"></script>
</body>

</html>
